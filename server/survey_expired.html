<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Link wygasł — Aimport</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f6f7f9;color:#0f172a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;min-height:100vh;
    align-items:center;justify-content:center;padding:24px}
  .card{max-width:440px;width:100%;background:#fff;border:1px solid #e2e8f0;
    border-radius:16px;padding:40px 32px;text-align:center;
    box-shadow:0 1px 2px rgba(15,23,42,.05)}
  .icon{width:52px;height:52px;border-radius:50%;background:#fef3c7;color:#b45309;
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
  h1{font-size:21px;margin:0 0 10px;letter-spacing:-0.01em}
  p{color:#64748b;font-size:15px;line-height:1.6;margin:0}
  .brand{margin-top:26px;font-size:12px;color:#94a3b8}
</style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
      </svg>
    </div>
    <h1>Ten link wygasł.</h1>
    <p>Skontaktuj się ze swoim agentem celnym, aby uzyskać nowy link.</p>
    <div class="brand">Aimport</div>
  </div>
</body>
</html>
