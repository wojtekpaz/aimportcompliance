# Railway / Nixpacks build configuration.
#
# The OCR fallback (server/invoice_ocr.py) shells out to two SYSTEM binaries
# that pip cannot provide:
#   * tesseract       (pytesseract)  — the OCR engine
#   * pdftoppm        (pdf2image)    — from poppler-utils, rasterises PDF pages
#
# If these are missing, OCR silently no-ops and every scanned/photographed
# invoice falls through to the "couldn't read this file" message. Declare them
# so the deployed container has them on PATH. The startup check in server/app.py
# logs a clear warning if tesseract is still unreachable at boot.
[phases.setup]
aptPkgs = ["tesseract-ocr", "poppler-utils"]
